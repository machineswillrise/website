<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Machines Will Rise</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div class="container">
			<h1>Machines Will Rise</h1>
			<p class="subtitle">Welcome to my personal portfolio website!</p>
			<p>Feel free to explore my projects and contact me if you have any questions.</p>
			
			<div class="links">
				<a href="https://github.com/machineswillrise">GitHub</a>
				<a href="https://news.ycombinator.com/user?id=machineswillrise">Hacker News</a>
			</div>

			<h2>Projects</h2>
			<div class="projects">
				<a href="https://github.com/machineswillrise/java-encrypter">Java Encrypter</a>
				<a href="https://github.com/machineswillrise/dotfiles">Dotfiles</a>
			</div>

			<form action="/contact" method="post" class="contact-form">
				<input type="text" name="name" placeholder="Name" required>
				<input type="email" name="email" placeholder="Email" required>
				<input type="text" name="message" placeholder="Message" required>
				<button type="submit">Send</button>
			</form>

			<p class="footer">This website is proudly served with <span class="orange-text">plain Java</span> with no frameworks or dependencies.</p>
		</div>
	</body>
</html>
